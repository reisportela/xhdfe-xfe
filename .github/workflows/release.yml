name: release-binaries

# Builds the prebuilt Stata plugin bundles for Linux, Windows and macOS
# (Apple Silicon) on real GitHub-hosted runners and attaches them to the
# draft release. Run manually with the exact, already-pushed tag; publish the
# draft only after this workflow succeeds and its assets are verified. Every
# platform is mandatory.
#
# CPU only, by design: CUDA/Metal binaries are not distributed — GPU is an
# opt-in optimization built from source. The plugins are COMPILED on each
# platform's runner (real native artifacts), but Stata itself cannot run on
# GitHub runners, so Stata runtime certification is performed on the release
# workstation and reported in the release notes.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach to a draft release"
        required: true

permissions:
  contents: write

env:
  TAG: ${{ github.event.inputs.tag }}

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0
      - name: Verify exact tag and version
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$(git rev-parse "${TAG}^{commit}")"
          expected="${TAG#v}"
          actual="$(python -c 'exec(open("xhdfe/_version.py").read()); print(__version__)')"
          test "$actual" = "$expected"
          grep -Fqx "v ${expected%.*}" stata/xhdfe.pkg
          grep -Fq "project(xhdfe VERSION $expected " CMakeLists.txt
          echo "release tag verified: $TAG -> $(git rev-parse HEAD)"

  # ---- Linux x86-64 (native, OpenMP) -------------------------------------
  linux:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}
      - name: Build Linux plugins (manylinux2014, CPU, OpenMP)
        run: |
          docker run --rm \
            -v "$PWD":/io \
            -w /io \
            -e XHDFE_STATIC_GNU_LIBS=ON \
            quay.io/pypa/manylinux2014_x86_64 \
            /bin/bash -lc '
              set -euo pipefail
              yum install -y zip curl tar gzip libstdc++-static
              g++ --version
              bash stata/tools/build-plugin.sh --linux --openmp
              bash stata/tools/build-xfe-plugin.sh --linux --openmp
            '
      - name: Check Linux binary compatibility
        run: |
          set -euo pipefail
          ldd stata/xhdfe.plugin || true
          ldd stata/xfe.plugin || true
          if readelf -Ws stata/xhdfe.plugin stata/xfe.plugin | grep -E 'GLIBC_(2\.(1[89]|[2-9][0-9])|[3-9])'; then
            echo "Linux plugin requires glibc newer than manylinux2014 (2.17)." >&2
            exit 1
          fi
          if readelf -Ws stata/xhdfe.plugin stata/xfe.plugin | grep -E 'GLIBCXX_'; then
            echo "Linux plugin still has a dynamic libstdc++/GLIBCXX dependency." >&2
            exit 1
          fi
      - name: Save Linux plugin artifacts
        run: |
          mkdir -p artifacts
          cp stata/xhdfe.plugin artifacts/xhdfe.plugin.linux-cpu
          cp stata/xfe.plugin artifacts/xfe.plugin.linux-cpu
      - name: Upload Linux plugin artifacts
        uses: actions/upload-artifact@v7
        with:
          name: plugins-linux
          path: artifacts/*

  # ---- Windows x86-64 (MinGW cross-compile on Linux) ---------------------
  windows:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}
      - name: Install MinGW toolchain
        run: |
          # Drop GitHub's third-party apt repos (packages.microsoft.com is
          # intermittently degraded and breaks apt-get update); the packages we
          # need come from the Ubuntu archive.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list 2>/dev/null || true
          sudo apt-get update || true
          sudo apt-get install -y g++-mingw-w64-x86-64 zip
      - name: Build Windows plugins (CPU, MinGW)
        run: |
          bash stata/tools/build-plugin.sh --windows --no-openmp
          bash stata/tools/build-xfe-plugin.sh --windows --no-openmp
      - name: Save Windows plugin artifacts
        run: |
          mkdir -p artifacts
          cp stata/xhdfe.plugin artifacts/xhdfe.plugin.windows
          cp stata/xfe.plugin artifacts/xfe.plugin.windows
      - name: Upload Windows plugin artifacts
        uses: actions/upload-artifact@v7
        with:
          name: plugins-windows
          path: artifacts/*
      - name: Package bundle
        run: bash .github/scripts/make_stata_bundle.sh windows-x86_64-cpu
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" xhdfe-stata-windows-x86_64-cpu.zip --clobber --repo "${{ github.repository }}"

  # ---- macOS universal (x86-64 + Apple Silicon arm64) --------------------
  macos:
    needs: validate-tag
    runs-on: macos-14           # Apple Silicon
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}
      - name: Install zip
        run: brew install zip || true
      - name: Build macOS universal plugins (CPU, serial)
        # Apple clang does not accept plain -fopenmp; ship a serial macOS
        # binary for now. OpenMP on macOS (libomp) is a follow-up.
        run: |
          bash stata/tools/build-plugin.sh --no-openmp
          bash stata/tools/build-xfe-plugin.sh --no-openmp
      - name: Save macOS plugin artifacts
        run: |
          mkdir -p artifacts
          cp stata/xhdfe.plugin artifacts/xhdfe.plugin.macos
          cp stata/xfe.plugin artifacts/xfe.plugin.macos
      - name: Upload macOS plugin artifacts
        uses: actions/upload-artifact@v7
        with:
          name: plugins-macos
          path: artifacts/*
      - name: Package bundle
        run: bash .github/scripts/make_stata_bundle.sh macos-universal-cpu
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" xhdfe-stata-macos-universal-cpu.zip --clobber --repo "${{ github.repository }}"

  # ---- Online Stata net-install site ------------------------------------
  publish-netinstall:
    runs-on: ubuntu-latest
    needs: [linux, windows, macos]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}
      - name: Install zip
        run: |
          # Drop GitHub's third-party apt repos (packages.microsoft.com is
          # intermittently degraded and breaks apt-get update); zip comes from
          # the Ubuntu archive.
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list 2>/dev/null || true
          sudo apt-get update || true
          sudo apt-get install -y zip
      - name: Download plugin artifacts
        uses: actions/download-artifact@v8
        with:
          path: dl
          pattern: plugins-*
          merge-multiple: true
      - name: Package and attach Linux bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp dl/xhdfe.plugin.linux-cpu stata/xhdfe.plugin
          cp dl/xfe.plugin.linux-cpu stata/xfe.plugin
          bash .github/scripts/make_stata_bundle.sh linux-x86_64-cpu
          gh release upload "$TAG" xhdfe-stata-linux-x86_64-cpu.zip --clobber --repo "${{ github.repository }}"
      - name: Stage Stata net-install site
        run: |
          set -euo pipefail
          ls -la dl
          bash tools/stage_stata_netinstall_site.sh netinstall_site/stata \
            --linux-xhdfe dl/xhdfe.plugin.linux-cpu \
            --linux-xfe   dl/xfe.plugin.linux-cpu \
            --macos-xhdfe dl/xhdfe.plugin.macos \
            --macos-xfe   dl/xfe.plugin.macos \
            --windows-xhdfe dl/xhdfe.plugin.windows \
            --windows-xfe   dl/xfe.plugin.windows
          bash tools/validate_stata_package_site.sh netinstall_site/stata
      - name: Build offline source distribution zip (for xhdfegpu)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Self-contained sources (C++/Stata/Python/R, CPU+GPU, all deps
          # vendored) that xhdfegpu downloads to build a CUDA plugin, and that
          # anyone can use to rebuild offline. Published into the net-install
          # site so it lands at <gh-pages>/stata/xhdfe-src.zip.
          bash tools/make_source_dist_zip.sh netinstall_site/stata/xhdfe-src.zip
          gh release upload "$TAG" netinstall_site/stata/xhdfe-src.zip --clobber --repo "${{ github.repository }}"
      - name: Build autonomous offline bundle (installables + sources)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          root="xhdfe-offline-${TAG#v}"
          rm -rf _offline xhdfe-offline-bundle.zip
          mkdir -p "_offline/$root/installable" "_offline/$root/sources"
          cp -a netinstall_site/. "_offline/$root/installable/"
          unzip -q netinstall_site/stata/xhdfe-src.zip -d "_offline/$root/sources"
          cp "RELEASE_NOTES_${TAG#v}.md" "_offline/$root/README.md"
          ( cd _offline && zip -q -r -X ../xhdfe-offline-bundle.zip "$root" )
          unzip -t xhdfe-offline-bundle.zip
          gh release upload "$TAG" xhdfe-offline-bundle.zip --clobber --repo "${{ github.repository }}"
      - name: Attach net-install site snapshot to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ( cd netinstall_site && zip -q -r -X ../xhdfe-stata-netinstall-site.zip . )
          unzip -t xhdfe-stata-netinstall-site.zip
          unzip -Z1 xhdfe-stata-netinstall-site.zip | grep -Fxq 'stata/xhdfe-src.zip'
          gh release upload "$TAG" xhdfe-stata-netinstall-site.zip --clobber --repo "${{ github.repository }}"
      - name: Publish Stata net-install site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./netinstall_site
          commit_message: Publish Stata net-install site for ${{ env.TAG }}
