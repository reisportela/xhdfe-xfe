name: build

# Continuous integration on the reference platform: Linux x86-64 + GCC.
# Builds the C++ core, the Python module, the Stata plugin and the R package,
# and runs the R test suite. Multi-platform prebuilt binaries (Windows,
# macOS Apple Silicon) are produced by release.yml on real runners.
#
# CPU only: CUDA is an opt-in, source-only optimization.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libomp-dev

      - name: Build C++ core + Python module (CMake, CPU)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DXHDFE_ENABLE_CUDA=OFF -DXHDFE_ENABLE_MARCH_NATIVE=OFF
          cmake --build build -j

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip install (source, portable -march)
        env:
          XHDFE_ENABLE_MARCH_NATIVE: "OFF"
        run: |
          python -m pip install --upgrade pip numpy
          python -m pip install .
          python -c "import xhdfe; print('python import OK', xhdfe.__version__)"

      - name: Build the Stata plugin (Linux, OpenMP, CPU)
        run: bash stata/tools/build-plugin.sh --linux --openmp

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true          # install binary packages (no source compilation)
      - name: R CMD INSTALL + tests
        env:
          XHDFE_MARCH: "x86-64-v2"
        run: |
          Rscript -e 'install.packages(c("Rcpp","testthat","jsonlite"))'
          R CMD INSTALL r/xhdfe
          Rscript -e 'testthat::test_local("r/xhdfe", stop_on_failure = TRUE)'
